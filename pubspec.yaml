name: ponpoko
description: "辛口ダイエットコーチぽんぽこ - 厳しくもサポートするダイエットアプリ"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_local_notifications: ^19.0.0
  shared_preferences: ^2.3.0
  google_fonts: ^6.2.0
  fl_chart: ^0.70.0
  intl: ^0.19.0
  url_launcher: ^6.2.0
  http: ^1.6.0
  image_picker: ^1.2.1
  flutter_dotenv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/ponta_default.png
    - assets/images/ponta_happy.png
    - assets/images/ponta_angry.png
    - assets/images/ponta_shocked.png
